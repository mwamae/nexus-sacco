<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2c5282" />
    <title>nexusSacco · Officer</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f7f8fb; color: #222; }
      .topbar { background: #2c5282; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
      .topbar a { color: #fff; text-decoration: none; font-size: 14px; }
      .container { padding: 12px; max-width: 600px; margin: 0 auto; }
      .card { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
      .btn { padding: 10px 14px; border-radius: 4px; border: 1px solid #c8d0dd; background: #fff; font-size: 14px; cursor: pointer; }
      .btn-primary { background: #2c5282; color: #fff; border-color: #2c5282; }
      .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
      .input { width: 100%; padding: 10px; border: 1px solid #c8d0dd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
      .mono { font-family: 'Courier New', monospace; }
      .muted { color: #555; font-size: 12px; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #e2e8f0; color: #333; }
      .badge-danger { background: #fed7d7; color: #c53030; }
      .badge-warn { background: #fefcbf; color: #b7791f; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
