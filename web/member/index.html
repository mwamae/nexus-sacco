<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nexusSacco · Member portal</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f7f8fb; color: #222; }
      .container { max-width: 720px; margin: 32px auto; padding: 0 16px; }
      .card { background: #fff; border: 1px solid #e2e6ee; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
      .btn { display: inline-block; padding: 8px 14px; border-radius: 4px; border: 1px solid #c8d0dd; background: #fff; cursor: pointer; font-size: 14px; }
      .btn-primary { background: #2c5282; color: #fff; border-color: #2c5282; }
      .input { width: 100%; padding: 8px 10px; border: 1px solid #c8d0dd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
      label { display: block; margin-bottom: 10px; }
      h1 { color: #2c5282; }
      .row { display: flex; gap: 12px; margin: 4px 0; }
      .row .lbl { color: #555; min-width: 160px; font-size: 13px; }
      .mono { font-family: 'Courier New', monospace; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
