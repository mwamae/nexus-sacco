name: nexussacco

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_sacco}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_sacco}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # SMTP catcher — assumes you already run MailHog on the host (port 1025/8025).
  # If not, start one with:  docker run -d --name mailhog -p 1025:1025 -p 8025:8025 mailhog/mailhog
  # The identity service inside compose reaches it via host.docker.internal.

  workflow:
    build:
      context: ./services/workflow
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_dev_password}@postgres:5432/${POSTGRES_DB:-nexus_sacco}?sslmode=disable
      WORKFLOW_HTTP_ADDR: :8083
      WORKFLOW_ENV: ${WORKFLOW_ENV:-development}
      WORKFLOW_LOG_LEVEL: ${WORKFLOW_LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-production-eef9b4c6c0f04f4d8a8b1e7f2a3b4c5d}
      JWT_ISSUER: ${JWT_ISSUER:-nexus-identity}
      APP_DOMAIN: ${APP_DOMAIN:-nexussacco.local}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy

  member:
    build:
      context: ./services/member
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_dev_password}@postgres:5432/${POSTGRES_DB:-nexus_sacco}?sslmode=disable
      MEMBER_HTTP_ADDR: :8082
      MEMBER_ENV: ${MEMBER_ENV:-development}
      MEMBER_LOG_LEVEL: ${MEMBER_LOG_LEVEL:-info}
      MEMBER_STORAGE_DIR: /var/lib/member/storage
      MEMBER_MAX_UPLOAD_BYTES: ${MEMBER_MAX_UPLOAD_BYTES:-5242880}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-production-eef9b4c6c0f04f4d8a8b1e7f2a3b4c5d}
      JWT_ISSUER: ${JWT_ISSUER:-nexus-identity}
      APP_DOMAIN: ${APP_DOMAIN:-nexussacco.local}
    ports:
      - "8082:8082"
    volumes:
      - member_storage:/var/lib/member/storage
    depends_on:
      postgres:
        condition: service_healthy

  identity:
    build:
      context: ./services/identity
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_dev_password}@postgres:5432/${POSTGRES_DB:-nexus_sacco}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      IDENTITY_HTTP_ADDR: :8081
      IDENTITY_ENV: ${IDENTITY_ENV:-development}
      IDENTITY_LOG_LEVEL: ${IDENTITY_LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-do-not-use-in-production-eef9b4c6c0f04f4d8a8b1e7f2a3b4c5d}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      JWT_ISSUER: ${JWT_ISSUER:-nexus-identity}
      APP_DOMAIN: ${APP_DOMAIN:-nexussacco.local}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.nexussacco.local}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-admin@nexussacco.local}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-ChangeMeOnFirstLogin!1}
      SMTP_HOST: ${SMTP_HOST:-host.docker.internal}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@nexussacco.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-nexusSacco}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  member_storage:
